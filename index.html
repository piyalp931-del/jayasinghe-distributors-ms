<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JDMS - Jayasinghe Distributors</title>
    
    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    
    <!-- Chart.js, SheetJS, jsPDF -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    
    <style>
        /* මෙතනට ඔබගේ style.css එකේ හැම CSS එකම Copy කරන්න - ඉඩ ඉතිරි කරලා මම දාන්නේ නැහැ, ඔබගේ style.css එක භාවිතා කරන්න */
        /* නැත්නම් මෙතනට සම්පූර්ණ CSS එක Paste කරන්න */
        /* මම කෙටියෙන් Login Styles දානවා */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg, #f0f4f9);
        }
        .login-card {
            background: var(--card-bg, #fff);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow, 0 4px 24px rgba(0,0,0,0.06));
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border, #e2e8f0);
        }
        .login-card .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-card .logo .logo-icon {
            width: 60px;
            height: 60px;
            background: #f5a623;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 800;
            color: #0f2647;
        }
        .login-card .logo h4 {
            margin-top: 12px;
            font-weight: 700;
        }
        .login-card .logo small {
            color: var(--text-muted, #64748b);
        }
        #mainApp {
            display: none;
        }
        #loginPage {
            display: flex;
        }
        .auth-error {
            color: #dc2626;
            font-size: 14px;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<!-- ===== LOGIN PAGE ===== -->
<div id="loginPage" class="login-container">
    <div class="login-card">
        <div class="logo">
            <div class="logo-icon">JD</div>
            <h4>Jayasinghe Distributors</h4>
            <small>Management System</small>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" class="form-control" id="loginEmail" placeholder="admin@test.com" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="loginPassword" placeholder="Password" required />
            </div>
            <button type="submit" class="btn btn-primary w-100" id="loginBtn">Login</button>
            <div id="loginError" class="auth-error text-center mt-2"></div>
        </form>
        <p class="text-center text-muted mt-3" style="font-size:13px;">Demo: admin@test.com / Admin123</p>
    </div>
</div>

<!-- ===== MAIN APP (Dashboard + Sidebar) ===== -->
<div id="mainApp">
    <!-- මෙතනට ඔබගේ පැරණි index.html එකේ හැම HTML එකම දාන්න (Sidebar, Topbar, Page Content) -->
    <!-- ඉඩ ඉතිරි කිරීමට මම මෙතන පෙන්වන්නේ නැහැ, නමුත් ඔබට ඒක Copy කරන්න පුළුවන් -->
    <!-- ඔබගේ පැරණි HTML එකේ <body> ඇතුලෙ තියෙන හැම දෙයක්ම මෙතනට ගේන්න -->
    <!-- උදාහරණයක් විදියට මම කෙටියෙන් දානවා -->
    <div class="main-wrapper">
        <!-- Topbar, Sidebar, Page Sections ... -->
        <p style="padding:20px;">Main App Content Here (Copy from your old index.html)</p>
    </div>
</div>

<!-- ===== TOAST & MODAL ===== -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999;"></div>
<div class="modal fade" id="confirmModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Confirm</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body" id="confirmBody">Are you sure?</div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-danger" id="confirmOkBtn">OK</button></div>
        </div>
    </div>
</div>

<!-- ===== FIREBASE CONFIG (ඔබගේ එක) ===== -->
<script src="firebase/firebase-config.js"></script>

<!-- ===== MAIN APP LOGIC (ඔබගේ app.js එක) ===== -->
<script src="assets/js/app.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Login Form Handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('loginError');
        const loginBtn = document.getElementById('loginBtn');
        
        errorDiv.textContent = '';
        loginBtn.disabled = true;
        loginBtn.innerHTML = 'Logging in...';
        
        try {
            await auth.signInWithEmailAndPassword(email, password);
            // On success, onAuthStateChanged will trigger and show main app
            showToast('Login successful!', 'success');
        } catch (err) {
            errorDiv.textContent = err.message;
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Login';
        }
    });

    // Override demoLogin to prevent auto-login when auth fails
    // We'll modify the app.js demoLogin to not auto-login
    // But we can also hide main app until user is authenticated
    // The app.js currently calls demoLogin if no user. We'll override that.
    // We'll add a check in the auth state listener.
    // Since we cannot change app.js now, we'll override the demoLogin function after load.
    // Actually, we can just set a flag.
    // Better: We'll modify app.js later, but for now, we'll just show login page if no user.

    // After Firebase loads, check auth state
    auth.onAuthStateChanged(user => {
        if (user) {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
        } else {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
        }
    });
</script>

</body>
</html>
